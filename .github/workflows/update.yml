name: Check Packages For Update
# Checks for packages updates:
# - Every 9AM UTC
# - On `./packages/*.sh` changes.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"
  push:
    paths:
      - 'packages/*.sh'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check For Updates
        run: |
          ./scripts/check_updates.sh

      - name: Commit Any Updates
        run: |
          if ! git diff --quiet packages/versions.ini; then
            VERSIONS="$(cat packages/versions.ini)"
            echo "Packages Updates Found!"
            echo "${VERSIONS}"
            git config user.name "github-actions"
            git config user.email "github-actions@users.noreply.github.com"
            git add packages/versions.ini
            git commit -m "Auto Updated Versions" -m "${VERSIONS}"
            git push
          else
            echo "No package updates."
          fi
